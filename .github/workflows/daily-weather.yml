name: Daily Weather Push

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Force push (ignore time check)"
        required: false
        default: false
        type: boolean

jobs:
  weather-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install requests python-dotenv

      - name: Fetch weather and push to Feishu
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          FORCE: ${{ github.event.inputs.force || 'false' }}
        run: |
          if [ "$FORCE" = "true" ]; then
            python main.py --force
          else
            python main.py
          fi
